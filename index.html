<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Information</title>
    <style>
      body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    text-align: center;
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

button {
    padding: 10px 20px;
    font-size: 18px;
    color: white;
    background-color: #007BFF;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #0056b3;
}

h1 {
    margin-top: 20px;
    font-size: 24px;
    color: #333;
}

    </style>
</head>
<body>
    <div class="container">
        <button id="cpuButton">Get CPU Info</button>
        <h1 id="cpuInfo"></h1>
    </div>
    <script>
      document.getElementById('cpuButton').addEventListener('click', () => {
    fetch('/cpu')
        .then(response => response.json())
        .then(data => {
            document.getElementById('cpuInfo').innerText = `CPU: ${data.manufacturer} ${data.brand} - ${data.speed} GHz`;
        })
        .catch(error => {
            document.getElementById('cpuInfo').innerText = 'Error fetching CPU info';
            console.error('Error:', error);
        });
});

    </script>
</body>
</html>
